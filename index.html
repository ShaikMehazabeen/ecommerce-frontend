<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Frontend</title>
    <link rel="stylesheet" href="styles/main.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">

        <!-- Logo -->
        <div class="logo">
            <a href="index.html">🛒 ShopEasy</a>
        </div>

        <!-- Navigation Links -->
        <nav class="navbar" id="navbar">
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Right Side: Search + Cart -->
        <div class="header-right">

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" placeholder="Search products...">
                <button><i class="fas fa-search"></i></button>
            </div>

            <!-- Cart Icon -->
            <div class="cart-icon">
                <a href="#">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge">3</span>
                </a>
            </div>

        </div>

        <!-- Hamburger Menu -->
        <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </div>

    </header>
    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <span class="hero-tag">New Arrivals 2026 🔥</span>
            <h1>Discover The Best <br> <span>Products Online</span></h1>
            <p>Shop the latest trends with unbeatable prices. <br> Free shipping on orders over 5000/-!</p>
            <div class="hero-buttons">
                <a href="#" class="btn-primary">Shop Now 🛒</a>
                <a href="#" class="btn-secondary">Explore Deals</a>
            </div>
            <div class="hero-stats">
                <div class="stat">
                    <h3>10K+</h3>
                    <p>Products</p>
                </div>
                <div class="stat">
                    <h3>50K+</h3>
                    <p>Customers</p>
                </div>
                <div class="stat">
                    <h3>4.9⭐</h3>
                    <p>Rating</p>
                </div>
            </div>
        </div>
        <div class="hero-image">
            <img src="https://img.freepik.com/free-vector/shopping-concept-landing-page_52683-18650.jpg" 
                 alt="Shopping Banner">
        </div>
    </section>

    <script src="scripts/app.js"></script>
</body>
</html>
